<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo URL Shortener</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            width: 400px;
        }
        h1 { color: #ff4a5a; margin-top: 0; }
        input[type="url"] {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #444;
            border-radius: 6px;
            background-color: #1e1e24;
            color: #fff;
            font-size: 16px;
        }
        button {
            background-color: #ff4a5a;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 96%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #e03f4f; }
        
        
        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #1e1e24;
            border-radius: 6px;
            display: none;
            text-align: left;
        }
        .result-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .copy-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2a2a35;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        .copy-box a {
            color: #4af2ff;
            text-decoration: none;
            font-weight: bold;
            word-break: break-all;
            margin-right: 10px;
        }
        .copy-box a:hover { text-decoration: underline; }
        
        .copy-btn {
            background-color: #444;
            color: #fff;
            padding: 6px 12px;
            font-size: 13px;
            width: auto;
            white-space: nowrap;
        }
        .copy-btn:hover { background-color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>URL Shortener</h1>
    <p>Paste a long URL to shorten it instantly</p>
    
    <input type="url" id="longUrl" placeholder="https://example.com" required>
    <button onclick="shortenUrl()">Shorten URL</button>

    <div class="result" id="resultBox">
        <div class="result-title">Shortened Link:</div>
        <div class="copy-box">
            <a id="shortLink" href="#" target="_blank"></a>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy</button>
        </div>
    </div>
</div>

<script>
async function shortenUrl() {
    const longUrlInput = document.getElementById('longUrl').value;
    const resultBox = document.getElementById('resultBox');
    const shortLink = document.getElementById('shortLink');
    const copyBtn = document.getElementById('copyBtn');

    if (!longUrlInput) {
        alert("Please enter a valid URL!");
        return;
    }

    
    copyBtn.innerText = "Copy";
    copyBtn.style.backgroundColor = "#444";

    try {
        const response = await fetch('/shorten', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ long_url: longUrlInput })
        });

        if (!response.ok) {
            
            const errorText = await response.text();
            throw new Error(errorText || "Server error");
        }

        const data = await response.json();
        
        shortLink.href = data.short_url;
        shortLink.innerText = data.short_url;
        resultBox.style.display = 'block';
    } catch (error) {
        alert(error.message);
    }
}

function copyToClipboard() {
    const linkText = document.getElementById('shortLink').innerText;
    const copyBtn = document.getElementById('copyBtn');

    if (!linkText) return;

    
    navigator.clipboard.writeText(linkText).then(() => {
        
        copyBtn.innerText = "Copied!";
        copyBtn.style.backgroundColor = "#28a745"; 
    }).catch(err => {
        console.error("Failed to copy text: ", err);
        alert("Could not copy link automatically.");
    });
}
</script>

</body>
</html>
