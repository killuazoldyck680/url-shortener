<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo URL Shortener</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            width: 400px;
        }
        h1 { color: #ff4a5a; margin-top: 0; }
        input[type="url"] {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #444;
            border-radius: 6px;
            background-color: #1e1e24;
            color: #fff;
            font-size: 16px;
        }
        button {
            background-color: #ff4a5a;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 96%;
            font-weight: bold;
        }
        button:hover { background-color: #e03f4f; }
        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #1e1e24;
            border-radius: 6px;
            word-break: break-all;
            display: none;
        }
        a { color: #4af2ff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>URL Shortener</h1>
    <p>Paste a long URL to shorten it instantly</p>
    
    <input type="url" id="longUrl" placeholder="https://example.com" required>
    <button onclick="shortenUrl()">Shorten URL</button>

    <div class="result" id="resultBox">
        Shortened Link: <br><br>
        <a id="shortLink" href="#" target="_blank"></a>
    </div>
</div>

<script>
async function shortenUrl() {
    const longUrlInput = document.getElementById('longUrl').value;
    const resultBox = document.getElementById('resultBox');
    const shortLink = document.getElementById('shortLink');

    if (!longUrlInput) {
        alert("Please enter a valid URL!");
        return;
    }

    try {
        // 🌟 Send JSON data to your Axum /shorten backend endpoint
        const response = await fetch('/shorten', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ long_url: longUrlInput })
        });

        if (!response.ok) throw new Error("Server error");

        const data = await response.json();
        
        // Display the link returned by your server
        shortLink.href = data.short_url;
        shortLink.innerText = data.short_url;
        resultBox.style.display = 'block';
    } catch (error) {
        alert("Failed to shorten URL. Is your Rust server running?");
    }
}
</script>

</body>
</html>
